name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install and Run clang-format
      run: |
        sudo apt-get update && sudo apt-get install -y clang-format
        find src -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

  misra-lint:
    name: MISRA C Compliance
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y cppcheck libtcc-dev
    - name: Build Compiler
      run: make ZC_HAS_JIT=1
    - name: Validate stdlib C Emission
      run: |
        mkdir -p .misra_bin
        ./zc build std/std.zc --misra --emit-c -o .misra_bin/std.c || exit 0
        cppcheck --addon=misra --quiet .misra_bin/std.c || exit 0

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            cc: gcc
            zc_has_jit: 1
          - name: Linux Clang
            os: ubuntu-latest
            cc: clang
            zc_has_jit: 1
          - name: Linux Zig CC
            os: ubuntu-latest
            cc: zig cc
            setup_zig: true
            zc_has_jit: 1
          - name: Linux TCC
            os: ubuntu-latest
            cc: tcc
            install_tcc: true
            zc_has_jit: 1
          - name: macOS
            os: macos-15-intel
            cc: cc # System default (usually clang)
            zc_has_jit: 0
          - name: Windows MinGW
            os: windows-latest
            cc: gcc
            zc_has_jit: 0

    steps:
    - uses: actions/checkout@v4

    - name: Setup Zig
      if: matrix.setup_zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: master

    - name: Install LibTCC (Linux)
      if: runner.os == 'Linux' && !matrix.install_tcc
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev

    - name: Cache TCC Source
      if: matrix.install_tcc
      uses: actions/cache@v4
      with:
        path: tinycc
        key: tcc-source-${{ hashFiles('**/ci.yml') }}

    - name: Install TCC (Source)
      if: matrix.install_tcc
      run: |
        if [ ! -d "tinycc" ]; then
          sudo apt-get update && sudo apt-get install -y git make gcc
          git clone -b mob https://github.com/TinyCC/tinycc.git
        fi
        cd tinycc
        ./configure
        make
        sudo make install

    - name: Build
      shell: bash
      run: |
        export ZC_HAS_JIT=${{ matrix.zc_has_jit }}
        if [ "${{ matrix.cc }}" = "zig cc" ]; then
           make ZC_HAS_JIT=$ZC_HAS_JIT
        elif [ "${{ runner.os }}" = "Windows" ]; then
           ./build.bat
        else
           make CC="${{ matrix.cc }}" ZC_HAS_JIT=$ZC_HAS_JIT
        fi

    - name: Run Tests
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          ./tests/scripts/run_tests.sh --cc "gcc" --no-source -j 2
        else
          ./tests/scripts/run_tests.sh --cc "${{ matrix.cc }}" --no-source -j 2
        fi

    - name: Upload Failed Test Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-test-artifacts-${{ matrix.name }}
        path: |
          test_out_parallel_*
          *.out.c
          *.out.cpp
        if-no-files-found: warn

  test-cpp:
    name: C++ Interoperability
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev g++
    - name: Build
      run: make ZC_HAS_JIT=1
    - name: Run C++ Tests
      run: ./tests/scripts/run_tests.sh --cpp --no-source -j 2
    - name: Upload Failed Test Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-test-artifacts-cpp
        path: |
          test_out_parallel_*
          *.out.c
          *.out.cpp
        if-no-files-found: warn

  test-sanitizers:
    name: Sanitizers (ASAN/UBSAN)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install libtcc-dev
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev
    - name: Build with Sanitizers
      run: make asan ZC_HAS_JIT=1
    - name: Run Tests with Sanitizers
      run: |
        export ASAN_OPTIONS=detect_leaks=0
        ./tests/scripts/run_tests.sh --no-source -j 2
    - name: Upload Failed Test Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-test-artifacts-sanitizers
        path: |
          test_out_parallel_*
          *.out.c
          *.out.cpp
        if-no-files-found: warn

  test-lsp:
    name: LSP Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install libtcc-dev
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev
    - name: Build and Run LSP Tests
      run: |
        make test-lsp ZC_HAS_JIT=1

  ape:
    name: Build APE
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: APE dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zip wget

    - name: Setup cosmocc
      run: |
        wget https://cosmo.zip/pub/cosmocc/cosmocc.zip
        mkdir -p $HOME/cosmocc
        unzip cosmocc.zip -d $HOME/cosmocc
        echo "$HOME/cosmocc/bin" >> $GITHUB_PATH

    - name: Build APE
      run: |
        export PATH="$HOME/cosmocc/bin:$PATH"
        make clean
        make ape ZC_HAS_JIT=0

    - name: Upload zc.com Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zc-portable
        path: out/bin/zc.com

    - name: Upload zc-boot.com Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zc-boot-portable
        path: out/bin/zc-boot.com

    - name: Test APE (Full Suite)
      run: |
        chmod +x out/bin/zc.com
        # Replace the local zc with the portable one to force run_tests.sh to use it
        cp out/bin/zc.com ./zc
        ./tests/scripts/run_tests.sh

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          out/bin/zc.com
          out/bin/zc-boot.com
        draft: false
        prerelease: false
        generate_release_notes: true
