name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install and Run clang-format
      run: |
        sudo apt-get update && sudo apt-get install -y clang-format
        find src -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

  lizard:
    name: Complexity Check (Lizard)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install Lizard
      run: pip install lizard
    - name: Run Lizard
      run: lizard src/ --CCN 25 --length 1500 --working_threads 4 | tee lizard-report.txt
    - name: Upload Lizard Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lizard-report
        path: lizard-report.txt

  cpd:
    name: Copy-Paste Detection (PMD CPD)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Install PMD
      run: |
        VERSION="7.0.0"
        wget https://github.com/pmd/pmd/releases/download/pmd_releases%2F${VERSION}/pmd-dist-${VERSION}-bin.zip
        unzip pmd-dist-${VERSION}-bin.zip
        echo "$(pwd)/pmd-bin-${VERSION}/bin" >> $GITHUB_PATH
    - name: Run PMD CPD
      run: pmd cpd --minimum-tokens 100 --dir src/ --language cpp --format text | tee cpd-report.txt
    - name: Upload PMD CPD Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cpd-report
        path: cpd-report.txt

  clang-tidy:
    name: Static Analysis (Clang-Tidy)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy libtcc-dev cmake
    - name: Generate compile_commands.json
      run: |
        mkdir build-cmake
        cd build-cmake
        cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ..
    - name: Run Clang-Tidy
      run: run-clang-tidy -p build-cmake 'src/.*\.c'

  misra-lint:
    name: MISRA C Compliance
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y cppcheck libtcc-dev
    - name: Build Compiler
      run: rm -f zc && make ZC_HAS_JIT=1
    - name: Validate stdlib C Emission
      run: |
        mkdir -p .misra_bin
        ./zc build std/std.zc --misra --emit-c -o .misra_bin/std.c || exit 0
        cppcheck --addon=misra --quiet .misra_bin/std.c || exit 0

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            cc: gcc
            zc_has_jit: 1
          - name: Linux Clang
            os: ubuntu-latest
            cc: clang
            zc_has_jit: 1
          - name: Linux Zig CC
            os: ubuntu-latest
            cc: zig cc
            setup_zig: true
            zc_has_jit: 1
          - name: Linux TCC
            os: ubuntu-latest
            cc: tcc
            install_tcc: true
            zc_has_jit: 1
          - name: macOS
            os: macos-15-intel
            cc: cc # System default (usually clang)
            zc_has_jit: 0
          - name: Windows MinGW
            os: windows-latest
            cc: gcc
            zc_has_jit: 0

    steps:
    - uses: actions/checkout@v4

    - name: Setup Zig
      if: matrix.setup_zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: master

    - name: Install ccache
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y ccache

    - name: Install LibTCC (Linux)
      if: runner.os == 'Linux' && !matrix.install_tcc
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev

    - name: Cache TCC Source
      if: matrix.install_tcc
      uses: actions/cache@v4
      with:
        path: tinycc
        key: tcc-source-${{ hashFiles('**/ci.yml') }}

    - name: Install TCC (Source)
      if: matrix.install_tcc
      run: |
        if [ ! -d "tinycc" ]; then
          sudo apt-get update && sudo apt-get install -y git make gcc
          git clone -b mob https://github.com/TinyCC/tinycc.git
        fi
        cd tinycc
        ./configure
        make
        sudo make install

    - name: Build
      shell: bash
      run: |
        rm -f zc zc.exe  # ensure fresh build, not a stale APE binary
        export ZC_HAS_JIT=${{ matrix.zc_has_jit }}
        export PATH="/usr/lib/ccache:$PATH"
        WERROR_FLAG=""
        if [ "${{ matrix.cc }}" = "gcc" ] && [ "${{ matrix.name }}" = "Linux GCC" ]; then
          WERROR_FLAG="WERROR=1"
        fi
        if [ "${{ matrix.cc }}" = "zig cc" ]; then
           make $WERROR_FLAG ZC_HAS_JIT=$ZC_HAS_JIT
        elif [ "${{ runner.os }}" = "Windows" ]; then
           ./build.bat
        else
           make CC="${{ matrix.cc }}" $WERROR_FLAG ZC_HAS_JIT=$ZC_HAS_JIT
        fi

    - name: Run Tests
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          ./tests/scripts/run_tests.sh --cc "gcc" --no-source -j 2
        else
          ./tests/scripts/run_tests.sh --cc "${{ matrix.cc }}" --no-source -j 2
        fi

    - name: Upload Failed Test Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-test-artifacts-${{ matrix.name }}
        path: |
          test_out_parallel_*
          *.out.c
          *.out.cpp
        if-no-files-found: warn

  test-cpp:
    name: C++ Interoperability
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev g++
    - name: Build
      run: rm -f zc && make ZC_HAS_JIT=1
    - name: Run C++ Tests
      run: ./tests/scripts/run_tests.sh --cpp --no-source -j 2
    - name: Upload Failed Test Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-test-artifacts-cpp
        path: |
          test_out_parallel_*
          *.out.c
          *.out.cpp
        if-no-files-found: warn

  test-cuda-syntax:
    name: CUDA Syntax Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev g++
    - name: Build
      run: rm -f zc && make ZC_HAS_JIT=1
    - name: Check CUDA output syntax
      run: |
        FAILED=0
        # Run all tests excluding backends/, then add CUDA-specific backend tests
        for f in $(find tests -name "test_*.zc" -not -path "*/misra/*" -not -path "*/backends/*" | sort); do
          head -1 "$f" | grep -q "EXPECT: FAIL" && continue
          base=$(basename "$f" .zc)
          ./zc transpile "$f" --cuda -o "/tmp/${base}.cu" 2>/dev/null || continue
          g++ -fsyntax-only -std=gnu++17 -I. -Istd/third-party/tre/include "/tmp/${base}.cu" 2>/dev/null || \
            { echo "FAIL: $f"; FAILED=$((FAILED + 1)); }
        done
        # Also run CUDA-specific backend tests
        for f in $(find tests/backends/cuda -name "test_*.zc" 2>/dev/null | sort); do
          head -1 "$f" | grep -q "EXPECT: FAIL" && continue
          base=$(basename "$f" .zc)
          ./zc transpile "$f" --cuda -o "/tmp/${base}.cu" 2>/dev/null || continue
          g++ -fsyntax-only -std=gnu++17 -I. -Istd/third-party/tre/include "/tmp/${base}.cu" 2>/dev/null || \
            { echo "FAIL: $f"; FAILED=$((FAILED + 1)); }
        done
        echo "CUDA syntax check: $FAILED failures"
        [ "$FAILED" -eq 0 ] || exit 1
    - name: Upload Failed CUDA Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-cuda-artifacts
        path: /tmp/*.cu
        if-no-files-found: warn

  test-objc-syntax:
    name: ObjC Syntax Check
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: brew install libtcc 2>/dev/null || true
    - name: Build
      run: rm -f zc && make ZC_HAS_JIT=0
    - name: Check ObjC output syntax
      run: |
        FAILED=0
        # Run all tests excluding backends/ and interop/ (interop needs external headers)
        for f in $(find tests -name "test_*.zc" -not -path "*/misra/*" -not -path "*/backends/*" -not -path "*/interop/*" | sort); do
          head -1 "$f" | grep -q "EXPECT: FAIL" && continue
          base=$(basename "$f" .zc)
          ./zc transpile "$f" --objc -o "/tmp/${base}.m" 2>/dev/null || continue
          clang -fsyntax-only -x objective-c -I. -Istd/third-party/tre/include "/tmp/${base}.m" 2>/dev/null || \
            { echo "FAIL: $f"; FAILED=$((FAILED + 1)); }
        done
        echo "ObjC syntax check: $FAILED failures"
        [ "$FAILED" -eq 0 ] || exit 1
    - name: Upload Failed ObjC Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-objc-artifacts
        path: /tmp/*.m
        if-no-files-found: warn

  test-sanitizers:
    name: Sanitizers (ASAN/UBSAN)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install libtcc-dev
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev
    - name: Build with Sanitizers
      run: rm -f zc && make asan ZC_HAS_JIT=1
    - name: Run Tests with Sanitizers
      run: |
        export ASAN_OPTIONS=detect_leaks=0
        ./tests/scripts/run_tests.sh --no-source -j 2
    - name: Upload Failed Test Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-test-artifacts-sanitizers
        path: |
          test_out_parallel_*
          *.out.c
          *.out.cpp
        if-no-files-found: warn

  test-lsp:
    name: LSP Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install libtcc-dev
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev
    - name: Build and Run LSP Tests
      run: |
        rm -f zc && make test-lsp ZC_HAS_JIT=1

  ape:
    name: Build APE
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: APE dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zip wget

    - name: Cache cosmocc
      uses: actions/cache@v4
      with:
        path: $HOME/cosmocc
        key: cosmocc-${{ hashFiles('**/ci.yml') }}

    - name: Setup cosmocc
      run: |
        if [ ! -d "$HOME/cosmocc/bin" ]; then
          wget https://cosmo.zip/pub/cosmocc/cosmocc.zip
          mkdir -p $HOME/cosmocc
          unzip cosmocc.zip -d $HOME/cosmocc
        fi
        echo "$HOME/cosmocc/bin" >> $GITHUB_PATH

    - name: Build APE
      run: |
        export PATH="$HOME/cosmocc/bin:$PATH"
        make clean
        rm -f zc && make ape ZC_HAS_JIT=0

    - name: Upload zc.com Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zc-portable
        path: out/bin/zc.com

    - name: Upload zc-boot.com Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zc-boot-portable
        path: out/bin/zc-boot.com

    - name: Test APE (Full Suite)
      run: |
        chmod +x out/bin/zc.com
        # Replace the local zc with the portable one to force run_tests.sh to use it
        cp out/bin/zc.com ./zc
        ./tests/scripts/run_tests.sh --no-source

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          out/bin/zc.com
          out/bin/zc-boot.com
        draft: false
        prerelease: false
        generate_release_notes: true
